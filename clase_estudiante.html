<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clase Estudiante - Tests</title>

<style>
body {
  margin: 0;
  font-family: "Inter", system-ui, Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #faf9f0 0%, #dff1f8 28%, #c6e1f8 58%, #ebd5f5 100%);
  color: #111827;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 14% 14%, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0) 20%),
    radial-gradient(circle at 80% 12%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0) 18%),
    linear-gradient(140deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0) 36%),
    linear-gradient(108deg, rgba(255,255,255,0.48) 0%, rgba(255,255,255,0) 28%);
  pointer-events: none;
  z-index: -1;
  filter: blur(0.8px);
}
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 18px 36px;
  position: relative;
  z-index: 1;
}
.header {
  background: rgba(255, 255, 255, 0.96);
  color: #0f172a;
  padding: 26px 30px;
  border-radius: 28px;
  box-shadow: 0 28px 50px rgba(15, 23, 42, 0.12);
  border: 1px solid rgba(255,255,255,0.8);
}
.header h2 {
  margin: 0;
  font-size: 32px;
  letter-spacing: -0.02em;
}
.header div {
  margin-top: 10px;
  color: #4b5563;
}
.card {
  background: rgba(255, 255, 255, 0.92);
  margin: 20px 0;
  padding: 24px;
  border-radius: 28px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
  border: 1px solid rgba(255,255,255,0.8);
}
.activity,
.pregunta {
  padding: 18px;
  margin-top: 16px;
  border-left: 5px solid #0f9d58;
  background: rgba(240, 255, 244, 0.94);
  border-radius: 22px;
}
.badge {
  display: inline-block;
  padding: 7px 16px;
  border-radius: 999px;
  background: #e8f5e9;
  color: #0f9d58;
  font-weight: 700;
}
.btn {
  width: 100%;
  border: none;
  padding: 14px 16px;
  border-radius: 16px;
  background: #0f9d58;
  color: white;
  font-size: 16px;
  font-weight: 700;
  margin-top: 16px;
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 14px 24px rgba(15, 157, 88, 0.18);
}
.btn:hover {
  transform: translateY(-1px);
}
.btn-sec {
  background: #5f6368;
}
button:disabled {
  background: #9aa0a6;
  cursor: not-allowed;
}
.oculto {
  display: none;
}
.opcion {
  display: block;
  margin: 10px 0;
  padding: 14px 16px;
  border-radius: 16px;
  background: #ffffff;
  border: 1px solid #d1d5db;
}
.opcion input {
  margin-right: 10px;
}
.resultado {
  font-size: 20px;
  font-weight: 700;
  color: #0f9d58;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h2 id="nombreClase">Cargando...</h2>
<div id="codigoClase">Código:</div>
<div id="usuarioActual"></div>
</div>

<div id="vistaActividades" class="card">
<h3>Tests disponibles</h3>
<div id="listaActividades">Cargando tests...</div>
<button class="btn" onclick="cargarClase()">Actualizar</button>
</div>

<div id="vistaTest" class="card oculto">
<h3 id="tituloTest"></h3>
<div id="contenedorPreguntas"></div>
<button class="btn" onclick="enviarRespuestas()">Enviar respuestas</button>
<button class="btn btn-sec" onclick="volverALista()">Volver</button>
</div>

<div id="vistaResultado" class="card oculto">
<h3>Resultado</h3>
<div id="resultadoFinal" class="resultado"></div>
<button class="btn" onclick="volverALista()">Volver a tests</button>
</div>

<script>
const FIREBASE="https://acentua-ya-default-rtdb.firebaseio.com";
const params=new URLSearchParams(window.location.search);

const clase=params.get("clase");
const usuario=params.get("usuario") || "Estudiante";

let actividadesGlobales={};
let testActual=null;
let testActualId=null;

document.getElementById("usuarioActual").innerText="Estudiante: "+usuario;

cargarClase();

async function cargarClase(){
    try{
        const response=await fetch(`${FIREBASE}/clases/${clase}.json`);
        const data=await response.json();

        if(!data){
            alert("Clase no encontrada");
            return;
        }

        document.getElementById("nombreClase").innerText=data.nombre || clase;
        document.getElementById("codigoClase").innerText="Código: "+(data.codigo || "");

        actividadesGlobales=data.actividades || {};
        await cargarActividades(actividadesGlobales);

    }catch(error){
        console.error(error);
        alert("Error cargando clase");
    }
}

async function cargarActividades(actividades){
    let html="";
    const lista=Object.keys(actividades);

    if(lista.length===0){
        document.getElementById("listaActividades").innerHTML="<p>No hay tests disponibles.</p>";
        return;
    }

    for(const id of lista){
        const act=actividades[id];

        if(act.tipo!=="test"){
            continue;
        }

        const totalPreguntas=act.preguntas ? Object.keys(act.preguntas).length : 0;

        const resultadoResponse=await fetch(`${FIREBASE}/resultados/${clase}/${id}/${usuario}.json`);
        const resultado=await resultadoResponse.json();

        if(resultado){
            html+=`
            <div class="activity">
                <b>${act.titulo || "Sin título"}</b>
                <br><br>
                <span class="badge">Test realizado</span>
                <br><br>
                Preguntas: ${totalPreguntas}
                <br>
                Fecha: ${act.fecha || ""}
                <br><br>
                <b>Tu puntaje: ${resultado.puntaje}%</b>
                <br>
                Correctas: ${resultado.correctas} / ${resultado.total}
                <br><br>
                <button class="btn btn-sec" disabled>Ya realizado</button>
            </div>`;
        }else{
            html+=`
            <div class="activity">
                <b>${act.titulo || "Sin título"}</b>
                <br><br>
                <span class="badge">Test</span>
                <br><br>
                Preguntas: ${totalPreguntas}
                <br>
                Fecha: ${act.fecha || ""}

                <button class="btn" onclick="abrirTest('${id}')">Resolver test</button>
            </div>`;
        }
    }

    document.getElementById("listaActividades").innerHTML=html || "<p>No hay tests disponibles.</p>";
}

function abrirTest(id){
    testActualId=id;
    testActual=actividadesGlobales[id];

    document.getElementById("vistaActividades").classList.add("oculto");
    document.getElementById("vistaResultado").classList.add("oculto");
    document.getElementById("vistaTest").classList.remove("oculto");

    document.getElementById("tituloTest").innerText=testActual.titulo || "Test";

    mostrarPreguntas();
}

function mostrarPreguntas(){
    const preguntas=testActual.preguntas || {};
    let html="";

    Object.keys(preguntas).forEach((idPregunta,index)=>{
        const p=preguntas[idPregunta];

        html+=`
        <div class="pregunta">
            <b>${index+1}. ${p.pregunta}</b>
            <br><br>`;

        if(p.tipo==="vf"){
            html+=`
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="verdadero">
                Verdadero
            </label>
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="falso">
                Falso
            </label>`;
        }

        if(p.tipo==="opcion"){
            const opA=(p.opciones && p.opciones.a) ? p.opciones.a : "";
            const opB=(p.opciones && p.opciones.b) ? p.opciones.b : "";
            const opC=(p.opciones && p.opciones.c) ? p.opciones.c : "";
            const opD=(p.opciones && p.opciones.d) ? p.opciones.d : "";

            html+=`
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="a">
                A) ${opA}
            </label>
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="b">
                B) ${opB}
            </label>
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="c">
                C) ${opC}
            </label>
            <label class="opcion">
                <input type="radio" name="${idPregunta}" value="d">
                D) ${opD}
            </label>`;
        }

        html+="</div>";
    });

    document.getElementById("contenedorPreguntas").innerHTML=html;
}

async function enviarRespuestas(){
    const preguntas=testActual.preguntas || {};
    let respuestas={};
    let correctas=0;
    let total=Object.keys(preguntas).length;

    for(const idPregunta of Object.keys(preguntas)){
        const seleccion=document.querySelector(`input[name="${idPregunta}"]:checked`);

        if(!seleccion){
            alert("Debe responder todas las preguntas");
            return;
        }

        respuestas[idPregunta]=seleccion.value;

        if(seleccion.value===preguntas[idPregunta].respuesta){
            correctas++;
        }
    }

    const puntaje=Math.round((correctas/total)*100);

    const resultado={
        usuario:usuario,
        respuestas:respuestas,
        correctas:correctas,
        total:total,
        puntaje:puntaje,
        fecha:new Date().toISOString().substring(0,10)
    };

    await fetch(`${FIREBASE}/resultados/${clase}/${testActualId}/${usuario}.json`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(resultado)
    });

    document.getElementById("vistaTest").classList.add("oculto");
    document.getElementById("vistaResultado").classList.remove("oculto");

    document.getElementById("resultadoFinal").innerHTML=
    `Correctas: ${correctas} / ${total}<br>Puntaje: ${puntaje}%`;
}

function volverALista(){
    document.getElementById("vistaTest").classList.add("oculto");
    document.getElementById("vistaResultado").classList.add("oculto");
    document.getElementById("vistaActividades").classList.remove("oculto");

    cargarClase();
}
</script>
</div>

</body>
</html>
