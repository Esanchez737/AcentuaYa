<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clase Docente</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f1f3f4;}
.header{background:#1a73e8;color:white;padding:20px;}
.card{background:white;margin:10px;padding:15px;border-radius:12px;}
.title{font-size:22px;font-weight:bold;}
.subtitle{margin-top:5px;}
.member{padding:8px;border-bottom:1px solid #eee;}
.activity{margin-top:10px;padding:10px;background:#fafafa;border-radius:8px;}
button{width:100%;border:none;padding:12px;border-radius:8px;background:#1a73e8;color:white;font-size:16px;}
</style>
</head>
<body>

<div class="header">
<div id="nombreClase" class="title">Cargando...</div>
<div id="codigoClase" class="subtitle">Código:</div>
</div>

<div class="card">
<h3>Miembros</h3>
<div id="totalMiembros">0 miembros</div>
<div id="listaMiembros"></div>
</div>

<div class="card">
<h3>Actividades</h3>
<div id="listaActividades"></div>
</div>

<div class="card">
<button onclick="crearActividad()">Crear Actividad</button>
</div>

<script>
const FIREBASE="https://acentua-ya-default-rtdb.firebaseio.com";
const params=new URLSearchParams(window.location.search);
const clase=params.get("clase");

cargarClase();

async function cargarClase(){
 const respuesta=await fetch(`${FIREBASE}/clases/${clase}.json`);
 const datos=await respuesta.json();
 if(!datos){ alert("Clase no encontrada"); return; }

 document.getElementById("nombreClase").innerText=datos.nombre || "";
 document.getElementById("codigoClase").innerText="Código: "+(datos.codigo||"");

 cargarMiembros(datos.miembros || {});
 cargarActividades(datos.actividades || {});
}

function cargarMiembros(miembros){
 let html="";
 const lista=Object.keys(miembros);
 document.getElementById("totalMiembros").innerText=lista.length+" miembros";

 lista.forEach(usuario=>{
   html += `<div class="member">👤 ${usuario}</div>`;
 });

 document.getElementById("listaMiembros").innerHTML=html;
}

function cargarActividades(actividades){
 let html="";
 Object.keys(actividades).forEach(id=>{
   const a=actividades[id];
   html += `<div class="activity">
      <b>${a.titulo||""}</b><br>
      Tipo: ${a.tipo||""}<br>
      Fecha: ${a.fecha||""}
   </div>`;
 });
 document.getElementById("listaActividades").innerHTML=html;
}

async function crearActividad(){
 const titulo=prompt("Título actividad");
 if(!titulo) return;

 const id="act"+Date.now();

 const actividad={
   titulo:titulo,
   tipo:"tarea",
   fecha:new Date().toISOString().substring(0,10)
 };

 await fetch(`${FIREBASE}/clases/${clase}/actividades/${id}.json`,{
   method:"PUT",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(actividad)
 });

 cargarClase();
}
</script>
</body>
</html>
