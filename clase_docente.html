<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clase Docente</title>

<style>
body {
  margin: 0;
  font-family: "Inter", system-ui, Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #faf9f0 0%, #dff1f8 35%, #c8e4f7 62%, #e4d0f4 100%);
  color: #1f2937;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 12% 12%, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0) 20%),
    radial-gradient(circle at 88% 8%, rgba(255,255,255,0.84) 0%, rgba(255,255,255,0) 18%),
    linear-gradient(145deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 34%),
    linear-gradient(110deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 28%);
  pointer-events: none;
  z-index: -1;
  filter: blur(0.8px);
}
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 18px 36px;
  position: relative;
  z-index: 1;
}
.header {
  background: rgba(255, 255, 255, 0.96);
  color: #111827;
  padding: 28px 30px;
  border-radius: 28px;
  box-shadow: 0 28px 50px rgba(15, 23, 42, 0.12);
  border: 1px solid rgba(255,255,255,0.8);
}
.title {
  font-size: 32px;
  font-weight: 800;
  margin: 0;
}
.subtitle {
  margin-top: 10px;
  color: #4b5563;
  font-size: 15px;
}
.card {
  background: rgba(255, 255, 255, 0.92);
  margin: 20px 0;
  padding: 24px;
  border-radius: 28px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
  border: 1px solid rgba(255,255,255,0.8);
}
.member,
.activity,
.pregunta-item,
.resultado-item {
  padding: 16px 0;
  border-bottom: 1px solid #e5e7eb;
}
.member:last-child,
.activity:last-child,
.pregunta-item:last-child,
.resultado-item:last-child {
  border-bottom: none;
}
button {
  width: 100%;
  border: none;
  padding: 14px 16px;
  border-radius: 16px;
  background: #4f46e5;
  color: white;
  font-size: 16px;
  font-weight: 700;
  margin-top: 16px;
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 14px 24px rgba(79, 70, 229, 0.18);
}
button:hover {
  transform: translateY(-1px);
}
button.secundario {
  background: #6b7280;
  box-shadow: 0 14px 24px rgba(107, 114, 128, 0.16);
}
button.peligro {
  background: #dc2626;
}
button.verde {
  background: #14b8a6;
}
input,
textarea,
select {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 18px;
  margin-top: 10px;
  margin-bottom: 14px;
  border: 1px solid #d1d5db;
  border-radius: 18px;
  font-size: 15px;
  background: rgba(248,250,252,0.95);
  color: #111827;
}
textarea {
  min-height: 120px;
  resize: vertical;
}
.oculto {
  display: none;
}
.badge {
  display: inline-block;
  padding: 7px 16px;
  border-radius: 999px;
  background: #eef2ff;
  color: #4338ca;
  font-size: 13px;
  font-weight: 700;
}
.small {
  font-size: 13px;
  color: #6b7280;
}
.resultado-box {
  background: rgba(239,246,255,0.96);
  border-left: 5px solid #4f46e5;
  margin-top: 18px;
  padding: 20px;
  border-radius: 22px;
}
.promedio {
  font-size: 24px;
  font-weight: 800;
  color: #4338ca;
}
.activity button {
  margin-top: 18px;
}
.pregunta-item {
  background: rgba(247,251,255,0.92);
  border-radius: 22px;
  padding: 18px;
  margin: 14px 0;
  border: 1px solid #e5e7eb;
}
.pregunta-item button {
  width: auto;
  padding: 10px 16px;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div id="nombreClase" class="title">Cargando...</div>
  <div id="codigoClase" class="subtitle">Código:</div>
</div>

<div class="card">
  <h3>👥 Miembros</h3>
  <div id="totalMiembros">0 miembros</div>
  <div id="listaMiembros"></div>
</div>

<div class="card">
  <h3>📝 Tests creados</h3>
  <div id="listaActividades"></div>
</div>

<div class="card">
  <button onclick="mostrarFormularioTest()">Crear Test</button>
</div>

<div id="panelResultados" class="card oculto">
  <h3 id="tituloResultados">Resultados</h3>
  <div id="contenidoResultados"></div>
  <button class="secundario" onclick="cerrarResultados()">Cerrar resultados</button>
</div>

<div id="formularioTest" class="card oculto">

  <h3>Crear nuevo test</h3>

  <label>Título del test</label>
  <input id="tituloTest" type="text" placeholder="Ejemplo: Quiz de Química">

  <h4>Agregar pregunta</h4>

  <label>Tipo de pregunta</label>
  <select id="tipoPregunta" onchange="cambiarTipoPregunta()">
    <option value="vf">Verdadero / Falso</option>
    <option value="opcion">Opción múltiple</option>
  </select>

  <label>Pregunta</label>
  <textarea id="textoPregunta" placeholder="Escriba la pregunta"></textarea>

  <div id="bloqueVF">
    <label>Respuesta correcta</label>
    <select id="respuestaVF">
      <option value="verdadero">Verdadero</option>
      <option value="falso">Falso</option>
    </select>
  </div>

  <div id="bloqueOpcion" class="oculto">
    <label>Opción A</label>
    <input id="opcionA" type="text">

    <label>Opción B</label>
    <input id="opcionB" type="text">

    <label>Opción C</label>
    <input id="opcionC" type="text">

    <label>Opción D</label>
    <input id="opcionD" type="text">

    <label>Respuesta correcta</label>
    <select id="respuestaOpcion">
      <option value="a">A</option>
      <option value="b">B</option>
      <option value="c">C</option>
      <option value="d">D</option>
    </select>
  </div>

  <button onclick="agregarPregunta()">Agregar Pregunta</button>

  <h4>Preguntas agregadas</h4>
  <div id="listaPreguntasTemporales"></div>

  <button onclick="guardarTest()">Guardar Test</button>
  <button class="secundario" onclick="cancelarTest()">Cancelar</button>

</div>

<script>
const FIREBASE="https://acentua-ya-default-rtdb.firebaseio.com";
const params=new URLSearchParams(window.location.search);
const clase=params.get("clase");

let preguntasTemporales=[];

cargarClase();

async function cargarClase(){
  const respuesta=await fetch(`${FIREBASE}/clases/${clase}.json`);
  const datos=await respuesta.json();

  if(!datos){
    alert("Clase no encontrada");
    return;
  }

  document.getElementById("nombreClase").innerText=datos.nombre || clase;
  document.getElementById("codigoClase").innerText="Código: "+(datos.codigo||"");

  cargarMiembros(datos.miembros || {});
  cargarActividades(datos.actividades || {});
}

function cargarMiembros(miembros){
  const lista=Object.keys(miembros);
  document.getElementById("totalMiembros").innerText=lista.length+" miembros";

  let html="";
  lista.forEach(usuario=>{
    html+=`<div class="member">👤 ${usuario}</div>`;
  });

  document.getElementById("listaMiembros").innerHTML=html || "<p>No hay miembros todavía.</p>";
}

function cargarActividades(actividades){
  let html="";
  const ids=Object.keys(actividades);

  if(ids.length===0){
    document.getElementById("listaActividades").innerHTML="<p>No hay tests creados.</p>";
    return;
  }

  ids.forEach(id=>{
    const a=actividades[id];

    if(a.tipo !== "test"){
      return;
    }

    const totalPreguntas=a.preguntas ? Object.keys(a.preguntas).length : 0;
    const tituloSeguro=(a.titulo || "Test").replace(/'/g,"");

    html+=`
    <div class="activity">
      <b>${a.titulo || "Sin título"}</b><br>
      <span class="badge">${a.tipo || "test"}</span><br>
      <span class="small">${totalPreguntas} preguntas</span><br>
      Fecha: ${a.fecha || ""}

      <button class="verde" onclick="verResultados('${id}','${tituloSeguro}')">
        Ver Resultados
      </button>
    </div>`;
  });

  document.getElementById("listaActividades").innerHTML=html || "<p>No hay tests creados.</p>";
}

async function verResultados(testId,titulo){

  const respuesta=await fetch(`${FIREBASE}/resultados/${clase}/${testId}.json`);
  const datos=await respuesta.json();

  document.getElementById("panelResultados").classList.remove("oculto");
  document.getElementById("tituloResultados").innerText="Resultados: "+titulo;

  if(!datos){
    document.getElementById("contenidoResultados").innerHTML=
    "<p>Nadie ha respondido este test todavía.</p>";
    return;
  }

  let html="";
  let suma=0;
  let cantidad=0;
  let mejor=-1;
  let peor=101;

  Object.keys(datos).forEach(usuario=>{
    const r=datos[usuario];
    const puntaje=Number(r.puntaje || 0);

    suma+=puntaje;
    cantidad++;

    if(puntaje>mejor) mejor=puntaje;
    if(puntaje<peor) peor=puntaje;

    html+=`
    <div class="resultado-item">
      👤 <b>${usuario}</b><br>
      Puntaje: <b>${puntaje}%</b><br>
      Correctas: ${r.correctas || 0} / ${r.total || 0}<br>
      Fecha: ${r.fecha || ""}
    </div>`;
  });

  const promedio=Math.round(suma/cantidad);

  document.getElementById("contenidoResultados").innerHTML=
  `
  <div class="resultado-box">
    <div class="promedio">Promedio del grupo: ${promedio}%</div>
    <br>
    Respondieron: ${cantidad}<br>
    Mejor nota: ${mejor}%<br>
    Menor nota: ${peor}%
  </div>
  <br>
  ${html}
  `;
}

function cerrarResultados(){
  document.getElementById("panelResultados").classList.add("oculto");
}

function mostrarFormularioTest(){
  preguntasTemporales=[];
  document.getElementById("formularioTest").classList.remove("oculto");
  document.getElementById("tituloTest").value="";
  limpiarFormularioPregunta();
  mostrarPreguntasTemporales();
}

function cancelarTest(){
  document.getElementById("formularioTest").classList.add("oculto");
  preguntasTemporales=[];
}

function cambiarTipoPregunta(){
  const tipo=document.getElementById("tipoPregunta").value;

  if(tipo==="vf"){
    document.getElementById("bloqueVF").classList.remove("oculto");
    document.getElementById("bloqueOpcion").classList.add("oculto");
  }else{
    document.getElementById("bloqueVF").classList.add("oculto");
    document.getElementById("bloqueOpcion").classList.remove("oculto");
  }
}

function agregarPregunta(){
  const tipo=document.getElementById("tipoPregunta").value;
  const pregunta=document.getElementById("textoPregunta").value.trim();

  if(!pregunta){
    alert("Escriba la pregunta");
    return;
  }

  let nuevaPregunta={};

  if(tipo==="vf"){
    nuevaPregunta={
      tipo:"vf",
      pregunta:pregunta,
      respuesta:document.getElementById("respuestaVF").value
    };
  }else{
    const a=document.getElementById("opcionA").value.trim();
    const b=document.getElementById("opcionB").value.trim();
    const c=document.getElementById("opcionC").value.trim();
    const d=document.getElementById("opcionD").value.trim();

    if(!a || !b || !c || !d){
      alert("Complete las 4 opciones");
      return;
    }

    nuevaPregunta={
      tipo:"opcion",
      pregunta:pregunta,
      opciones:{a:a,b:b,c:c,d:d},
      respuesta:document.getElementById("respuestaOpcion").value
    };
  }

  preguntasTemporales.push(nuevaPregunta);
  limpiarFormularioPregunta();
  mostrarPreguntasTemporales();
}

function limpiarFormularioPregunta(){
  document.getElementById("textoPregunta").value="";
  document.getElementById("opcionA").value="";
  document.getElementById("opcionB").value="";
  document.getElementById("opcionC").value="";
  document.getElementById("opcionD").value="";
  document.getElementById("respuestaVF").value="verdadero";
  document.getElementById("respuestaOpcion").value="a";
}

function mostrarPreguntasTemporales(){
  let html="";

  if(preguntasTemporales.length===0){
    document.getElementById("listaPreguntasTemporales").innerHTML="<p>No hay preguntas agregadas.</p>";
    return;
  }

  preguntasTemporales.forEach((p,index)=>{
    html+=`
    <div class="pregunta-item">
      <b>${index+1}. ${p.pregunta}</b><br>
      Tipo: ${p.tipo==="vf" ? "Verdadero/Falso" : "Opción múltiple"}<br>
      Correcta: ${p.respuesta}<br>
      <button class="peligro" onclick="eliminarPregunta(${index})">Eliminar</button>
    </div>`;
  });

  document.getElementById("listaPreguntasTemporales").innerHTML=html;
}

function eliminarPregunta(index){
  preguntasTemporales.splice(index,1);
  mostrarPreguntasTemporales();
}

async function guardarTest(){
  const titulo=document.getElementById("tituloTest").value.trim();

  if(!titulo){
    alert("Escriba el título del test");
    return;
  }

  if(preguntasTemporales.length===0){
    alert("Agregue al menos una pregunta");
    return;
  }

  const id="test"+Date.now();
  const preguntas={};

  preguntasTemporales.forEach((p,index)=>{
    preguntas["p"+(index+1)]=p;
  });

  const test={
    titulo:titulo,
    tipo:"test",
    fecha:new Date().toISOString().substring(0,10),
    preguntas:preguntas
  };

  await fetch(`${FIREBASE}/clases/${clase}/actividades/${id}.json`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(test)
  });

  alert("Test guardado correctamente");
  cancelarTest();
  cargarClase();
}
</script>
</div>

</body>
</html>
