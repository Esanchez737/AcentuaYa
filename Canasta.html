<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canastas de Acentuación</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef3f7;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}
#game{
  width:100%;
  height:100dvh;
  min-height:100svh;
  position:relative;
  background:linear-gradient(#dff3ff,#ffffff);
}
.header{
  height:60px;
  background:#159447;
  color:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:20px;
  font-weight:bold;
}
#word{
  position:absolute;
  top:80px;
  background:white;
  padding:12px 28px;
  border-radius:15px;
  font-size:34px;
  font-weight:bold;
  box-shadow:0 3px 8px rgba(0,0,0,.25);
  cursor:grab;
  user-select:none;
  touch-action:none;
  z-index:2;
  transition:transform .15s ease, background .2s ease, box-shadow .2s ease;
}
.word-correct{
  animation: correctPulse .6s ease;
}
.word-wrong{
  animation: wrongShake .5s ease;
}
.baskets{
  position:absolute;
  bottom:15px;
  left:0;
  width:100%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:8px;
}
.basket{
  min-height:120px;
  background:white;
  border:4px dashed #159447;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
}
.basket .icon{
  font-size:44px;
  margin-bottom:5px;
}
#message{
  position:absolute;
  top:70px;
  width:100%;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#159447;
}
#gameOver{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.75);
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  z-index:10;
}
#gameOver button{
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#159447;
  color:white;
}
#screenFlash{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:rgba(255,0,0,0);
  z-index:5;
}
@keyframes correctPulse{
  0% { transform: scale(1); background:#fff; }
  40% { transform: scale(1.08); background:#d9f7e3; }
  70% { transform: scale(1.03); background:#8ce5a5; }
  100% { transform: scale(1); background:#fff; }
}
@keyframes wrongShake{
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
@keyframes screenFlash{
  0% { background:rgba(255,0,0,0); }
  30% { background:rgba(255,0,0,.18); }
  70% { background:rgba(255,0,0,.08); }
  100% { background:rgba(255,0,0,0); }
}
@media(max-width:600px){
  .header{
    height:52px;
    font-size:15px;
    padding:0 8px;
  }
  #message{
    top:58px;
    font-size:16px;
    padding:0 8px;
  }
  #word{
    top:72px;
    font-size:26px;
    padding:10px 18px;
    max-width:calc(100% - 24px);
    text-align:center;
  }
  .baskets{
    bottom:6px;
    gap:6px;
    padding:6px;
    grid-template-columns:repeat(2,1fr);
  }
  .basket{
    min-height:88px;
    font-size:12px;
    border-width:3px;
    border-radius:14px;
  }
  .basket .icon{font-size:32px}
}
</style>
</head>

<body>

<div id="game">

  <div class="header">
    <div id="score">Puntaje: 0</div>
    <div id="timer">Tiempo: 10</div>
    <div id="lives">Vidas: 3</div>
  </div>

  <div id="message"></div>
  <div id="screenFlash"></div>

  <div id="word">café</div>

  <div class="baskets">
    <div class="basket" data-category="aguda">
      <div class="icon">🧺</div>
      Agudas
    </div>

    <div class="basket" data-category="grave">
      <div class="icon">🧺</div>
      Graves
    </div>

    <div class="basket" data-category="esdrujula">
      <div class="icon">🧺</div>
      Esdrújulas
    </div>

    <div class="basket" data-category="sobreesdrujula">
      <div class="icon">🧺</div>
      Sobreesdrújulas
    </div>
  </div>

  <div id="gameOver">
    <h1>Juego terminado</h1>
    <h2 id="finalScore"></h2>
    <button onclick="reiniciar()">Reiniciar</button>
  </div>

</div>

<script>
const palabras = [
  {texto:"café", categoria:"aguda"},
  {texto:"papel", categoria:"aguda"},
  {texto:"reloj", categoria:"aguda"},
  {texto:"compás", categoria:"aguda"},
  {texto:"balón", categoria:"aguda"},
  {texto:"canción", categoria:"aguda"},
  {texto:"corazón", categoria:"aguda"},
  {texto:"rubí", categoria:"aguda"},
  {texto:"menú", categoria:"aguda"},
  {texto:"sofá", categoria:"aguda"},
  {texto:"camión", categoria:"aguda"},
  {texto:"motor", categoria:"aguda"},
  {texto:"cruzar", categoria:"aguda"},
  {texto:"jardín", categoria:"aguda"},

  {texto:"mesa", categoria:"grave"},
  {texto:"fácil", categoria:"grave"},
  {texto:"lápiz", categoria:"grave"},
  {texto:"túnel", categoria:"grave"},
  {texto:"álbum", categoria:"grave"},
  {texto:"móvil", categoria:"grave"},
  {texto:"cárcel", categoria:"grave"},
  {texto:"tórax", categoria:"grave"},
  {texto:"cóndor", categoria:"grave"},
  {texto:"mármol", categoria:"grave"},
  {texto:"dólar", categoria:"grave"},
  {texto:"tóner", categoria:"grave"},
  {texto:"azul", categoria:"grave"},
  {texto:"fútbol", categoria:"grave"},

  {texto:"música", categoria:"esdrujula"},
  {texto:"pájaro", categoria:"esdrujula"},
  {texto:"rápido", categoria:"esdrujula"},
  {texto:"técnico", categoria:"esdrujula"},
  {texto:"médico", categoria:"esdrujula"},
  {texto:"fantástico", categoria:"esdrujula"},
  {texto:"teléfono", categoria:"esdrujula"},
  {texto:"lámpara", categoria:"esdrujula"},
  {texto:"película", categoria:"esdrujula"},
  {texto:"público", categoria:"esdrujula"},
  {texto:"sílaba", categoria:"esdrujula"},
  {texto:"próximo", categoria:"esdrujula"},
  {texto:"cámara", categoria:"esdrujula"},
  {texto:"mírame", categoria:"esdrujula"},

  {texto:"dígamelo", categoria:"sobreesdrujula"},
  {texto:"cuéntamelo", categoria:"sobreesdrujula"},
  {texto:"explícamelo", categoria:"sobreesdrujula"},
  {texto:"rápidamente", categoria:"sobreesdrujula"},
  {texto:"explícaselo", categoria:"sobreesdrujula"},
  {texto:"tráemelo", categoria:"sobreesdrujula"},
  {texto:"llévaselo", categoria:"sobreesdrujula"},
  {texto:"repítemelo", categoria:"sobreesdrujula"},
  {texto:"devuélvemelo", categoria:"sobreesdrujula"},
  {texto:"mándaselo", categoria:"sobreesdrujula"},
  {texto:"envíamelo", categoria:"sobreesdrujula"},
  {texto:"préstamelo", categoria:"sobreesdrujula"},
  {texto:"entrégaselo", categoria:"sobreesdrujula"},
  {texto:"pásaselo", categoria:"sobreesdrujula"},
  {texto:"consíguemelo", categoria:"sobreesdrujula"},
  {texto:"anúnciamelo", categoria:"sobreesdrujula"}
];

const word = document.getElementById("word");
const scoreBox = document.getElementById("score");
const timerBox = document.getElementById("timer");
const livesBox = document.getElementById("lives");
const message = document.getElementById("message");
const screenFlash = document.getElementById("screenFlash");
const gameOverBox = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

let actual = null;
let score = 0;
let lives = 3;
let timeLeft = 10;
let timerId = null;
let dragging = false;
let resolving = false;
let offsetX = 0;
let offsetY = 0;
let y = 80;
let x = window.innerWidth / 2;
let running = true;

function nuevaPalabra(){
  actual = palabras[Math.floor(Math.random()*palabras.length)];
  word.textContent = actual.texto;
  resolving = false;
  timeLeft = 10;
  timerBox.textContent = "Tiempo: " + timeLeft;
  if(timerId) clearInterval(timerId);
  timerId = setInterval(()=>{
    if(!running || resolving) return;
    timeLeft--;
    timerBox.textContent = "Tiempo: " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerId);
      perderVida("Se acabó el tiempo");
    }
  }, 1000);
  const maxX = Math.max(0, window.innerWidth - word.offsetWidth);
  x = Math.max(0, Math.min(maxX, (window.innerWidth - word.offsetWidth) / 2));
  y = 80;
  word.style.left = x + "px";
  word.style.top = y + "px";
  message.textContent = "";
}

function ajustarPantalla(){
  const maxX = Math.max(0, window.innerWidth - word.offsetWidth);
  x = Math.max(0, Math.min(x, maxX));
  word.style.left = x + "px";
}

function actualizar(){
  scoreBox.textContent = "Puntaje: " + score;
  livesBox.textContent = "Vidas: " + lives;
  timerBox.textContent = "Tiempo: " + timeLeft;
}

function perderVida(msg){
  if(!running || resolving) return;
  if(timerId) clearInterval(timerId);
  resolving = true;
  lives--;
  actualizar();
  message.textContent = msg;

  if(lives <= 0){
    terminarJuego();
  }else{
    setTimeout(()=>{
      if(running) {
        resolving = false;
        nuevaPalabra();
      }
    }, 500);
  }
}

function terminarJuego(){
  running = false;
  if(timerId) clearInterval(timerId);
  gameOverBox.style.display = "flex";
  finalScore.textContent = "Puntaje final: " + score;
}

function activarFlash(){
  screenFlash.style.animation = "none";
  void screenFlash.offsetWidth;
  screenFlash.style.animation = "screenFlash .6s ease";
}

function soltar(){
  if(!dragging || !running || !actual) return;

  dragging = false;
  word.style.cursor = "grab";

  const wordRect = word.getBoundingClientRect();
  const centerX = wordRect.left + wordRect.width/2;
  const centerY = wordRect.top + wordRect.height/2;

  let basketCorrecta = null;

  document.querySelectorAll(".basket").forEach(basket=>{
    const r = basket.getBoundingClientRect();
    const overlaps = !(wordRect.right < r.left || wordRect.left > r.right || wordRect.bottom < r.top || wordRect.top > r.bottom);

    if(overlaps){
      if(basket.dataset.category === actual.categoria){
        basketCorrecta = basket;
      }
    }
  });

  if(basketCorrecta){
    score++;
    actualizar();
    message.textContent = "¡Correcto!";
    word.classList.remove("word-wrong");
    word.classList.add("word-correct");
    resolving = true;
    setTimeout(()=>{
      if(running) {
        word.classList.remove("word-correct");
        resolving = false;
        nuevaPalabra();
      }
    }, 600);
  }else if(document.elementFromPoint(centerX, centerY)?.closest(".basket")){
    word.classList.remove("word-correct");
    word.classList.add("word-wrong");
    activarFlash();
    setTimeout(()=>{
      word.classList.remove("word-wrong");
    }, 500);
    perderVida("Incorrecto");
  }else{
    word.classList.remove("word-correct");
    word.classList.add("word-wrong");
    activarFlash();
    setTimeout(()=>{
      word.classList.remove("word-wrong");
    }, 500);
    perderVida("No cayó en una canasta");
  }
}

word.addEventListener("pointerdown", e=>{
  if(!running || !actual || resolving) return;
  e.preventDefault();
  dragging = true;
  word.setPointerCapture(e.pointerId);
  const r = word.getBoundingClientRect();
  offsetX = e.clientX - r.left;
  offsetY = e.clientY - r.top;
  word.style.cursor = "grabbing";
});

word.addEventListener("pointermove", e=>{
  if(!dragging || !running) return;
  e.preventDefault();

  const maxLeft = Math.max(0, window.innerWidth - word.offsetWidth);
  const maxTop = Math.max(0, window.innerHeight - word.offsetHeight - 140);

  x = Math.min(maxLeft, Math.max(0, e.clientX - offsetX));
  y = Math.min(maxTop, Math.max(0, e.clientY - offsetY));

  word.style.left = x + "px";
  word.style.top = y + "px";
});

word.addEventListener("pointerup", soltar);
word.addEventListener("pointercancel", soltar);
document.addEventListener("pointerup", soltar);
document.addEventListener("pointercancel", soltar);

function reiniciar(){
  if(timerId) clearInterval(timerId);
  score = 0;
  lives = 3;
  timeLeft = 10;
  running = true;
  resolving = false;
  gameOverBox.style.display = "none";
  actualizar();
  nuevaPalabra();
}

window.addEventListener("resize", ajustarPantalla);
window.addEventListener("orientationchange", ajustarPantalla);

actualizar();
nuevaPalabra();
</script>

</body>
</html>
